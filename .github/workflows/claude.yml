name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
          # model: "claude-opus-4-20250514"
          
          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"
          
          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"
          
          # Allow Claude to run specific commands for development and testing
          allowed_tools: "Bash(npm install),Bash(npm ci),Bash(npm run build),Bash(npm run build:watch),Bash(npm run test),Bash(npm run test:watch),Bash(npm run test:coverage),Bash(npm run lint),Bash(npm run lint:fix),Bash(npm run format),Bash(npm run format:check),Bash(npm run dev:quiet)"
          
          # Custom instructions for Claude based on project requirements
          custom_instructions: |
            This is the Universal Paperclips game modernization project. When working on this codebase:
            
            **Architecture & Patterns:**
            - Use ES6 modules with clear separation of concerns
            - Follow the existing GameState pattern for state management with dot notation access
            - Add new systems to src/game/systems/ directory
            - Use errorHandler for all error handling with proper context
            - Measure performance with performanceMonitor for expensive operations
            
            **Code Quality:**
            - Always add JSDoc documentation for new functions and classes
            - Write unit tests for new features in tests/unit/
            - Follow existing code conventions and patterns
            - Use the formatting and linting tools before committing
            - Never add comments unless explicitly requested
            
            **Testing & Validation:**
            - Run tests before making changes: npm test
            - Use npm run lint and npm run format:check for code quality
            - Verify builds work: npm run build
            - Test the game locally: npm run dev:quiet
            
            **State Management:**
            - Use gameState.get() and gameState.set() for state access
            - Use gameState.increment() and gameState.decrement() for numeric changes
            - Follow the centralized state management pattern
            
            **Performance:**
            - Game loop runs at 60 FPS with automatic throttling
            - Batch UI updates for performance
            - Use performance monitoring for expensive operations
            
            **Security:**
            - Never commit secrets or API keys
            - Sanitize all user input
            - Use error boundaries to prevent crashes
            
            Remember: The goal is to maintain the original gameplay while providing a modern, maintainable codebase.
          
          # Optional: Custom environment variables for Claude
          # claude_env: |
          #   NODE_ENV: test

