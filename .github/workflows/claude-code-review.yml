name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Focus automated reviews on external contributors and first-time contributors
    if: |
      github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' ||
      github.event.pull_request.author_association == 'CONTRIBUTOR' ||
      github.event.pull_request.author_association == 'NONE'
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
          # model: "claude-opus-4-20250514"
          
          # Direct prompt for automated review (no @claude mention needed)
          direct_prompt: |
            Welcome to the Universal Paperclips project! Please review this pull request focusing on:
            
            **Code Quality & Architecture:**
            - ES6 module patterns and separation of concerns
            - GameState usage for state management (gameState.get/set/increment/decrement)
            - Error handling with errorHandler and proper context
            - Performance monitoring for expensive operations
            - JSDoc documentation for new functions/classes
            
            **Game-Specific Considerations:**
            - Maintains original gameplay mechanics
            - Follows existing UI patterns in src/game/ui/
            - Uses proper system organization in src/game/systems/
            - Integrates with the game loop appropriately
            
            **Testing & Quality:**
            - Unit tests for new features in tests/unit/
            - Code follows existing formatting and linting standards
            - No introduction of global variables
            - Proper error boundaries and recovery
            
            **Security & Performance:**
            - No secrets or API keys committed
            - Efficient algorithms for game mechanics
            - Proper input sanitization
            - Memory leak prevention
            
            Please be encouraging and provide specific, actionable feedback. Include code examples where helpful!
          
          # Optional: Customize review based on file types
          # direct_prompt: |
          #   Review this PR focusing on:
          #   - For TypeScript files: Type safety and proper interface usage
          #   - For API endpoints: Security, input validation, and error handling
          #   - For React components: Performance, accessibility, and best practices
          #   - For tests: Coverage, edge cases, and test quality
          
          # Optional: Different prompts for different authors
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' && 
          #   'Welcome! Please review this PR from a first-time contributor. Be encouraging and provide detailed explanations for any suggestions.' ||
          #   'Please provide a thorough code review focusing on our coding standards and best practices.' }}
          
          # Optional: Add specific tools for running tests or linting
          # allowed_tools: "Bash(npm run test),Bash(npm run lint),Bash(npm run typecheck)"
          
          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')

